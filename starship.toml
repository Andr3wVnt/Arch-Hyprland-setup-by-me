# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

#############
#   Notes   #
#############

# This config assumes you have a Nerd Font installed and enabled in your terminal.
# I use 'FiraCode Nerd Font Mono', but you should be able to use any Nerd Font you like.

################
#   Settings   #
################

# Inserts a blank line between shell prompts
add_newline = true

# Maximum time it may take to produce the prompt
command_timeout = 3000

########################
#   Webber's colours   #
########################

# Bright pink: (bg:#e6b6f2 fg:#452152)
# Middle pink, bright text: (bg:#5e386a fg:#f9d8ff)
# Middle pink, faded text: (bg:#5e386a fg:#f9d8ff)
# Dark pink, regular text: (bg:#514254 fg:#f2dcf3)
# Dark pink, highlighted: (bg:#514254 fg:#e6b6f2)

###############
### PROMPTS ###
###############

# Left prompt
format = """
[¯éÂ](bg:transparent fg:#89b4fa)\
$os\
$username\
[¯é┤](fg:#89b4fa bg:#1e1e2e)\
$directory\
${custom.pregit}\
$git_branch\
$git_state\
$git_metrics\
$git_status\
${custom.postgit}\
${custom.nogit}\
$package\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$nodejs\
$bun\
$nim\
$rust\
$scala\
$docker_context\
$character\
"""

# Right prompt (Time & Memory)
right_format = """
[¯éÂ](bg:transparent fg:#1e1e2e)\
$time\
$memory_usage\
[¯é┤](fg:#1e1e2e bg:transparent)\
\
"""

########################
### SPECIAL SECTIONS ###
########################

# Exit code indicator (The arrow at the end)
[character]
success_symbol = '[¯éÂ](bg:#1e1e2e fg:#89b4fa)[¾▒ç½](bg:#89b4fa fg:#1e1e2e)[¯é┤](fg:#89b4fa bg:transparent)'
error_symbol = '[¯éÂ](bg:#1e1e2e fg:#ffb4ab)[¾▒ç½](bg:#ffb4ab fg:#690005)[¯é┤](fg:#ffb4ab bg:transparent)'
format = '$symbol '

# Username (The first pill)
[username]
show_always = true
style_user = "bg:#89b4fa fg:#1e1e2e"
style_root = "bg:#89b4fa fg:#1e1e2e"
format = '[ $user]($style)'

# OS Symbol (The Icon)
[os]
style = "bg:#89b4fa fg:#1e1e2e"
format = '[$symbol]($style)'
disabled = false

# The current directory (The middle darker pill)
[directory]
style = "bg:#1e1e2e fg:#89b4fa"
format = "[ $path ]($style)"
truncation_length = 1
truncation_symbol = "ÔÇª/"

[time]
disabled = false
time_format = "%R"
style = "bg:#1e1e2e fg:#89b4fa"
format = '[$time]($style)'

#######################
#   Version control   #
#######################


[git_branch]
symbol = "´Éÿ"
style = "bg:#514254 fg:#f2dcf3"
format = '[¯é┤](fg:#5e386a bg:#514254)[ $symbol](bg:#514254 fg:#e6b6f2)[ $branch ]($style)'

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = '[­ƒìÆ PICKING](bg:#514254 fg:bold red)'
rebase = '[¯®ñ REBASING](bg:#514254 fg:bold green)'
merge = '[¯£º MERGING](bg:#514254 fg:bold yellow)'
bisect = '[­ƒöì BISECTING](bg:#514254 fg:bold blue)'
am = '[AM](bg:#514254 fg:bold green)'
am_or_rebase = '[AM/REBASE](bg:#514254 fg:bold green)'
revert = '[¾░òì REVERTING](bg:#514254 fg:bold red)'

[git_metrics]
added_style = "bg:#514254 fg:#f5b7b3"
deleted_style = "bg:#514254 fg:#ffb4ab"
format = '([+$added ]($added_style))([-$deleted ]($deleted_style))'
disabled = false

[git_status]
style = "bg:#514254 fg:#e6b6f2"
conflicted = '=' # This branch has merge conflicts.
ahead = '¯¬á'
behind = '¯¬Ø'
diverged = '¾▒íÀ'
up_to_date = ''
untracked = '?'
stashed = '´àò'
modified = '´æä'
staged = '¯½┤'
renamed = '┬╗'
deleted = 'Ô£ÿ'
format = '([($all_status )($ahead_behind )]($style))[¯éÂ](bg:#514254 fg:#5e386a)'

[fossil_branch]
symbol = "´Éÿ"

[hg_branch]
symbol = "´Éÿ"

[pijul_channel]
symbol = "´Éÿ"

