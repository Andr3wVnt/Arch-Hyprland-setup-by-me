# 1. Define the Apps (Openers)
[opener]
image = [
	{ run = 'imv "$@"', orphan = true, desc = "View Image" },
]
pdf = [
	{ run = 'zathura "$@"', orphan = true, desc = "Read PDF" },
]

# 2. Map Files to Apps
[open]
prepend_rules = [
	# PDF Rule (Brackets are REQUIRED for 'use')
	{ name = "*.pdf", use = [ "pdf" ] },

	# Image Rules (Using MIME catch-all is safer)
	{ mime = "image/*", use = [ "image" ] },
	
	# Fallback for explicit extensions if MIME fails
	{ name = "*.jpg", use = [ "image" ] },
	{ name = "*.png", use = [ "image" ] },
	{ name = "*.jpeg", use = [ "image" ] },
]

[[manager.prepend_keymap]]
on   = [ "C" ]
run  = 'shell -- "wl-copy < \"$1\"" --confirm'
desc = "Copy image content to clipboard"
