# ==========================================
#  MY PERMANENT VISUAL SETTINGS
# ==========================================

general {
    gaps_in = 2
    gaps_out = 4
    border_size = 3
    layout = dwindle
    resize_on_border = false

    # Active Border: Blue Gradient (Matches your pasted config)
    col.active_border = rgb(89b4fa) rgb(74c7ec) 45deg

    # Want "Hacker Green" instead to match your notifications? 
    # Uncomment the line below and comment out the Blue one above:
    # col.active_border = rgb(00FF00) rgb(008800) 45deg

    col.inactive_border = rgb(313244)
}

decoration {
    rounding = 5
    rounding_power = 2
    active_opacity = 0.95
    inactive_opacity = 0.85

    blur {
        enabled = true
        size = 3
        passes = 3
        new_optimizations = on
        ignore_opacity = true
        xray = true
    }

    shadow {
        enabled = true
        range = 15
        render_power = 2
        color = 0x6689b4fa
    }
}

animations {
    enabled = true
    bezier = easeOut, 0.25, 1, 0.5, 1
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = quick,0.15,0,0.1,1
    animation = global, 1, 5, default
    animation = windows, 1, 4.5, easeOutQuint
    animation = windowsIn, 1, 2.8, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.2, linear, popin 87%
    animation = workspaces, 1, 2, easeOut, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
}
